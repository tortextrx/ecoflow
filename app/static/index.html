<!DOCTYPE html>
<html lang="es" data-theme="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ecoFlow — Terminal ERP dinámico</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap');

    :root {
      /* DARK THEME (CORE) */
      --bg: #05090a;
      --surface: #0c181a;
      --surface-alt: #122124;
      --border: #1a2f32;
      --border-bright: #2d4f54;
      --accent: #16B6CD;
      --accent-secondary: #F99746;
      --accent-dim: rgba(22, 182, 205, 0.12);
      --text: #f1f5f9;
      --muted: #94a3b8;
      --radius: 2px;
      --font-mono: 'JetBrains Mono', monospace;
      --bot-bg: rgba(22, 182, 205, 0.03);
      --dot-color: #16B6CD;
      --shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
    }

    [data-theme="light"] {
      --bg: #f8fafc;
      --surface: #ffffff;
      --surface-alt: #f1f5f9;
      --border: #cbd5e1;
      --border-bright: #94a3b8;
      --accent: #16B6CD;
      --accent-secondary: #F99746;
      --accent-dim: rgba(22, 182, 205, 0.08);
      --text: #0f172a;
      --muted: #64748b;
      --bot-bg: rgba(22, 182, 205, 0.04);
      --dot-color: #16B6CD;
      --shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.1);
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    @media (prefers-reduced-motion: reduce) {

      *,
      ::before,
      ::after {
        animation-delay: -1ms !important;
        animation-duration: 1ms !important;
        animation-iteration-count: 1 !important;
        background-attachment: initial !important;
        scroll-behavior: auto !important;
        transition-duration: 0s !important;
        transition-delay: 0s !important;
      }
    }

    html,
    body {
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      transition: background 0.3s, color 0.3s;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
      background-image:
        radial-gradient(circle at 50% 50%, var(--accent-dim) 0%, transparent 80%),
        linear-gradient(rgba(22, 182, 205, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(22, 182, 205, 0.03) 1px, transparent 1px);
      background-size: 100% 100%, 40px 40px, 40px 40px;
    }

    .shell {
      width: min(840px, 100%);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      background: var(--bg);
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
      position: relative;
      box-shadow: var(--shadow);
    }

    /* HEADER */
    .hd {
      height: 72px;
      padding: 0 24px;
      flex-shrink: 0;
      background: var(--surface);
      border-bottom: 2px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .hd-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .orb-container {
      position: relative;
      width: 48px;
      height: 48px;
      flex-shrink: 0;
    }

    .orb {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: conic-gradient(from 0deg, var(--accent), var(--accent-secondary), var(--accent));
      animation: spin 6s linear infinite;
      box-shadow: 0 0 15px var(--accent-dim);
    }

    .orb-img {
      position: absolute;
      inset: 3px;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      object-fit: cover;
      background-color: var(--bg);
      z-index: 2;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .brand {
      font-family: var(--font-mono);
      font-size: 1.15rem;
      font-weight: 700;
      letter-spacing: -0.05em;
    }

    .brand span {
      color: var(--accent);
    }

    .sub {
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-top: 4px;
    }

    .hd-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .theme-toggle {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      width: 38px;
      height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
      border-radius: var(--radius);
    }

    .theme-toggle:hover {
      color: var(--accent);
      border-color: var(--accent);
      background: var(--accent-dim);
    }

    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: var(--font-mono);
      font-size: 0.65rem;
      color: var(--accent);
      background: var(--accent-dim);
      border: 1px solid var(--accent);
      padding: 6px 14px;
      border-radius: var(--radius);
    }

    .dot {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
        transform: scale(1.1);
      }

      50% {
        opacity: 0.4;
        transform: scale(0.9);
      }
    }

    /* CHAT AREA */
    .chat {
      flex: 1;
      overflow-y: auto;
      padding: 32px 24px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      scroll-behavior: smooth;
    }

    .chat::-webkit-scrollbar {
      width: 4px;
    }

    .chat::-webkit-scrollbar-thumb {
      background: var(--border-bright);
    }

    .row {
      display: flex;
      width: 100%;
    }

    .row.me {
      justify-content: flex-end;
    }

    .bub {
      max-width: 80%;
      padding: 14px 18px;
      position: relative;
      font-size: 0.92rem;
      line-height: 1.6;
      animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      word-break: break-word;
      border: 1px solid var(--border);
      background: var(--surface-alt);
      border-radius: var(--radius);
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(12px);
      }

      to {
        opacity: 1;
        transform: none;
      }
    }

    .bub.bot {
      border-left: 3px solid var(--accent);
      background: var(--bot-bg);
    }

    .bub.bot::before {
      content: "ecoFlow // System";
      position: absolute;
      top: -18px;
      left: 0;
      font-family: var(--font-mono);
      font-size: 0.6rem;
      color: var(--accent);
      opacity: 0.8;
    }

    .bub.me {
      border-right: 3px solid var(--muted);
      background: var(--surface);
    }

    .bub.me::before {
      content: "Auth // User";
      position: absolute;
      top: -18px;
      right: 0;
      font-family: var(--font-mono);
      font-size: 0.6rem;
      color: var(--muted);
      opacity: 0.8;
    }

    .bub strong {
      color: var(--accent);
      font-weight: 600;
    }

    .file-card {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--accent-dim);
      border: 1px solid var(--accent);
      padding: 10px 14px;
      margin-top: 4px;
      border-radius: var(--radius);
    }

    .file-card svg {
      color: var(--accent);
      flex-shrink: 0;
    }

    /* TYPING */
    .typing {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 24px 16px;
    }

    .typing-dots {
      display: flex;
      gap: 4px;
    }

    .typing-dots span {
      width: 5px;
      height: 5px;
      background: var(--accent);
      animation: bounceDots 1.4s infinite;
    }

    .typing-dots span:nth-child(2) {
      animation-delay: 0.2s;
    }

    .typing-dots span:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes bounceDots {

      0%,
      80%,
      100% {
        transform: scale(1);
        opacity: 0.4;
      }

      40% {
        transform: scale(1.4);
        opacity: 1;
      }
    }

    .typing-label {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      color: var(--accent);
      letter-spacing: 0.05em;
      font-weight: 700;
    }

    /* INPUT BAR */
    .bar {
      flex-shrink: 0;
      padding: 20px 24px;
      background: var(--surface);
      border-top: 2px solid var(--border);
      display: flex;
      align-items: flex-end;
      gap: 12px;
    }

    .action-btn {
      width: 44px;
      height: 44px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
      border-radius: var(--radius);
    }

    .action-btn:hover {
      color: var(--accent);
      border-color: var(--accent);
      background: var(--accent-dim);
    }

    .file-preview {
      display: none;
      align-items: center;
      gap: 10px;
      background: var(--accent-dim);
      border: 1px solid var(--accent);
      padding: 6px 12px;
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: var(--accent);
      max-width: 200px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      border-radius: var(--radius);
    }

    .btn-close {
      background: none;
      border: none;
      color: var(--accent);
      cursor: pointer;
      font-size: 1rem;
      line-height: 1;
    }

    textarea {
      flex: 1;
      min-height: 44px;
      max-height: 160px;
      resize: none;
      outline: none;
      font-family: inherit;
      font-size: 0.95rem;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      padding: 11px 16px;
      line-height: 1.5;
      transition: border-color 0.2s;
      border-radius: var(--radius);
    }

    textarea:focus {
      border-color: var(--accent);
    }

    textarea::placeholder {
      color: var(--muted);
      opacity: 0.5;
    }

    .btn-send {
      width: 46px;
      height: 46px;
      border: none;
      cursor: pointer;
      background: var(--accent);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
      border-radius: var(--radius);
      box-shadow: 0 4px 12px rgba(22, 182, 205, 0.3);
    }

    .btn-send:hover {
      background: var(--accent-secondary);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(249, 151, 70, 0.4);
    }

    .btn-send:active {
      transform: translateY(0);
    }

    .btn-send:disabled {
      opacity: 0.3;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .btn-send svg {
      width: 22px;
      height: 22px;
    }
  </style>
</head>

<body>
  <div class="shell">
    <header class="hd">
      <div class="hd-left">
        <div class="orb-container">
          <div class="orb"></div>
          <img src="/api/ecoflow/static/ecoScanCalidad.png" class="orb-img" alt="ecoFlow Robot" aria-hidden="true">
        </div>
        <div>
          <div class="brand">eco<span>Flow</span></div>
          <div class="sub">Terminal ERP dinámico</div>
        </div>
      </div>
      <div class="hd-right">
        <button class="theme-toggle" id="themeToggle" title="Cambiar tema" aria-label="Cambiar tema">
          <svg id="themeIcon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></svg>
        </button>
        <div class="status"><span class="dot"></span>CONECTADO</div>
      </div>
    </header>

    <main class="chat" id="chatArea"></main>

    <div class="typing" id="typingArea" style="display:none">
      <div class="typing-dots"><span></span><span></span><span></span></div>
      <span class="typing-label" id="typingLabel">ecoFlow ESTÁ PROCESANDO…</span>
    </div>

    <footer class="bar">
      <label class="action-btn" title="Adjuntar documento" aria-label="Adjuntar documento">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path
            d="m21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l8.57-8.57A4 4 0 1 1 18 8.84l-8.59 8.51a2 2 0 0 1-2.83-2.83l8.49-8.48" />
        </svg>
        <input type="file" id="fileInput" accept=".jpg,.jpeg,.png,.pdf" style="display:none">
      </label>
      <div class="file-preview" id="filePreview">
        <span id="fileName"></span>
        <button class="btn-close" id="clearFile" aria-label="Eliminar archivo">✕</button>
      </div>
      <textarea id="msgInput" placeholder="Escriba un comando o mensaje…" rows="1"
        aria-label="Mensaje para ecoFlow"></textarea>
      <button class="btn-send" id="sendBtn" title="Enviar" aria-label="Enviar mensaje">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="m5 12 7-7 7 7" />
          <path d="M12 19V5" />
        </svg>
      </button>
    </footer>
  </div>

  <script src="/api/ecoflow/static/chat.js?v=5.1"></script>
</body>

</html>
