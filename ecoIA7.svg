<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="54 54 172 172"
     width="37"
     height="37"
     role="img"
     aria-label="ecoIA">
  <defs>
    <radialGradient id="petal1" cx="0.28" cy="0.22" r="0.85">
      <stop offset="0%" stop-color="rgba(184,240,247,0.8)"/>
      <stop offset="18%" stop-color="rgba(45,200,222,0.78)"/>
      <stop offset="55%" stop-color="rgba(15,141,159,0.55)"/>
      <stop offset="100%" stop-color="rgba(10,93,106,0.3)"/>
    </radialGradient>

    <radialGradient id="shine1" cx="0.5" cy="0.5" r="0.55">
      <stop offset="0%" stop-color="rgba(255,255,255,0.85)"/>
      <stop offset="55%" stop-color="rgba(255,255,255,0.25)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>

    <radialGradient id="hot1" cx="0.5" cy="0.5" r="0.55">
      <stop offset="0%" stop-color="#fff"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>

    <radialGradient id="petal2" cx="0.32" cy="0.26" r="0.8">
      <stop offset="0%" stop-color="rgba(230,250,253,0.7)"/>
      <stop offset="22%" stop-color="rgba(27,181,204,0.6)"/>
      <stop offset="60%" stop-color="rgba(15,141,159,0.4)"/>
      <stop offset="100%" stop-color="rgba(10,93,106,0.18)"/>
    </radialGradient>

    <radialGradient id="petal3" cx="0.28" cy="0.22" r="0.85">
      <stop offset="0%" stop-color="rgba(218,218,220,0.6)"/>
      <stop offset="22%" stop-color="rgba(139,138,141,0.5)"/>
      <stop offset="60%" stop-color="rgba(90,89,91,0.35)"/>
      <stop offset="100%" stop-color="rgba(58,57,59,0.18)"/>
    </radialGradient>

    <radialGradient id="orbGrad" cx="0.38" cy="0.32" r="0.82">
      <stop offset="0%" stop-color="#5a5a62"/>
      <stop offset="45%" stop-color="#3f3e40"/>
      <stop offset="100%" stop-color="#1f1e20"/>
    </radialGradient>

    <radialGradient id="ambientGlow" cx="0.5" cy="1" r="0.7">
      <stop offset="0%" stop-color="rgba(15,141,159,0.55)"/>
      <stop offset="60%" stop-color="rgba(15,141,159,0.08)"/>
      <stop offset="100%" stop-color="rgba(15,141,159,0)"/>
    </radialGradient>

    <radialGradient id="specLarge" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0%" stop-color="rgba(255,255,255,0.55)"/>
      <stop offset="60%" stop-color="rgba(255,255,255,0.12)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>

    <radialGradient id="specSmall" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0%" stop-color="rgba(255,255,255,0.95)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>

    <radialGradient id="rimLight" cx="0.5" cy="0.18" r="0.58">
      <stop offset="82%" stop-color="rgba(255,255,255,0)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.6)"/>
    </radialGradient>

    <linearGradient id="textGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3fd0e3"/>
      <stop offset="50%" stop-color="#13a7bb"/>
      <stop offset="100%" stop-color="#0a6a78"/>
    </linearGradient>

    <!-- Destello vertical potente -->
    <linearGradient id="sweepCore" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="rgba(255,255,255,0)"/>
      <stop offset="35%" stop-color="rgba(255,255,255,0.12)"/>
      <stop offset="50%" stop-color="rgba(255,250,230,1)"/>
      <stop offset="65%" stop-color="rgba(255,255,255,0.12)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>

    <linearGradient id="sweepSoft" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="rgba(255,255,255,0)"/>
      <stop offset="40%" stop-color="rgba(255,230,170,0)"/>
      <stop offset="50%" stop-color="rgba(255,220,150,0.82)"/>
      <stop offset="60%" stop-color="rgba(255,230,170,0)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>

    <clipPath id="orbClip">
      <circle r="62" transform="translate(140 140)"/>
    </clipPath>

    <filter id="sweepGlow" x="-200%" y="-200%" width="400%" height="400%">
      <feGaussianBlur stdDeviation="4.2"/>
    </filter>

    <filter id="sweepCoreGlow" x="-200%" y="-200%" width="400%" height="400%">
      <feGaussianBlur stdDeviation="1.8"/>
    </filter>
  </defs>

  <!-- halo -->
  <circle r="76" transform="translate(140 140)" opacity="0.20" fill="#0f8d9f">
    <animate attributeName="opacity" values="0.15;0.34;0.15" dur="4.8s" repeatCount="indefinite"/>
    <animate attributeName="r" values="74;78;74" dur="4.8s" repeatCount="indefinite"/>
  </circle>

  <!-- pétalos -->
  <g transform="translate(140 140) scale(0.88) translate(-140 -140)">
    <g transform="matrix(0.866025 0.5 -0.511555 0.886039 77.8475 -74.5307)">
      <animateTransform attributeName="transform" additive="sum" type="translate"
        values="0 0; 2 -2; -1 1; 0 0"
        dur="6.8s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" additive="sum" type="rotate"
        values="-2 178 108; 2.5 178 108; -1.5 178 108; -2 178 108"
        dur="7.6s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" additive="sum" type="scale"
        values="1 1; 1.05 0.96; 0.98 1.04; 1 1"
        dur="6.1s" repeatCount="indefinite"/>

      <ellipse rx="44" ry="36" transform="translate(178 108)" fill="url(#petal1)">
        <animate attributeName="rx" values="44;46;43;44" dur="6.4s" repeatCount="indefinite"/>
        <animate attributeName="ry" values="36;34;38;36" dur="6.4s" repeatCount="indefinite"/>
      </ellipse>
      <ellipse rx="18" ry="9" transform="translate(162 96)" fill="url(#shine1)">
        <animate attributeName="rx" values="18;19;17.5;18" dur="5.8s" repeatCount="indefinite"/>
        <animate attributeName="ry" values="9;8.4;9.5;9" dur="5.8s" repeatCount="indefinite"/>
      </ellipse>
      <ellipse rx="6" ry="2.5" transform="translate(158 93)" fill="url(#hot1)">
        <animate attributeName="rx" values="6;6.6;5.8;6" dur="5.2s" repeatCount="indefinite"/>
      </ellipse>
      <ellipse rx="38" ry="3" transform="translate(178 74)" opacity="0.25" fill="#fff">
        <animate attributeName="opacity" values="0.18;0.32;0.18" dur="5.5s" repeatCount="indefinite"/>
      </ellipse>
    </g>

    <g transform="matrix(0.963686 -0.512401 0.462485 0.869807 -70.2194 70.3652)">
      <animateTransform attributeName="transform" additive="sum" type="translate"
        values="0 0; -2 1; 1 -2; 0 0"
        dur="7.4s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" additive="sum" type="rotate"
        values="1.5 106 176; -2.5 106 176; 2 106 176; 1.5 106 176"
        dur="8.1s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" additive="sum" type="scale"
        values="1 1; 0.97 1.06; 1.03 0.95; 1 1"
        dur="6.7s" repeatCount="indefinite"/>

      <ellipse rx="40" ry="46" transform="translate(106 176)" fill="url(#petal2)">
        <animate attributeName="rx" values="40;38.5;41.5;40" dur="6.9s" repeatCount="indefinite"/>
        <animate attributeName="ry" values="46;48;44.5;46" dur="6.9s" repeatCount="indefinite"/>
      </ellipse>
      <ellipse rx="14" ry="10" transform="translate(92 156)" fill="url(#shine1)">
        <animate attributeName="rx" values="14;15;13.4;14" dur="5.9s" repeatCount="indefinite"/>
        <animate attributeName="ry" values="10;9.2;10.7;10" dur="5.9s" repeatCount="indefinite"/>
      </ellipse>
      <ellipse rx="5" ry="2.5" transform="translate(90 152)" fill="url(#hot1)">
        <animate attributeName="rx" values="5;5.7;4.8;5" dur="5.1s" repeatCount="indefinite"/>
      </ellipse>
      <ellipse rx="3" ry="34" transform="translate(106 134)" opacity="0.22" fill="#fff">
        <animate attributeName="opacity" values="0.16;0.28;0.16" dur="5.7s" repeatCount="indefinite"/>
      </ellipse>
    </g>

    <g transform="matrix(0.839443 -0.655844 0.706705 0.904542 -41.5985 83.1891)">
      <animateTransform attributeName="transform" additive="sum" type="translate"
        values="0 0; 1.2 1.6; -1.2 -1.4; 0 0"
        dur="8.2s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" additive="sum" type="rotate"
        values="-1.2 100 102; 2 100 102; -2.2 100 102; -1.2 100 102"
        dur="7.1s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" additive="sum" type="scale"
        values="1 1; 1.04 0.97; 0.96 1.03; 1 1"
        dur="6.6s" repeatCount="indefinite"/>

      <ellipse rx="34" ry="40" transform="matrix(0.622349 0.78274 -0.78274 0.622349 100 102)" fill="url(#petal3)">
        <animate attributeName="rx" values="34;35.5;33;34" dur="6.5s" repeatCount="indefinite"/>
        <animate attributeName="ry" values="40;38.5;41.5;40" dur="6.5s" repeatCount="indefinite"/>
      </ellipse>
      <ellipse rx="12" ry="8" transform="translate(88 84)" fill="url(#shine1)">
        <animate attributeName="rx" values="12;12.8;11.3;12" dur="5.4s" repeatCount="indefinite"/>
        <animate attributeName="ry" values="8;7.3;8.6;8" dur="5.4s" repeatCount="indefinite"/>
      </ellipse>
      <ellipse rx="4" ry="2" transform="translate(85 80)" fill="url(#hot1)">
        <animate attributeName="rx" values="4;4.5;3.8;4" dur="5.0s" repeatCount="indefinite"/>
      </ellipse>
    </g>

    <g transform="matrix(0.422618 0.906308 -0.96401 0.449525 251.744 -79.1595)">
      <animateTransform attributeName="transform" additive="sum" type="translate"
        values="0 0; -1.5 -1.2; 2 1.4; 0 0"
        dur="7.7s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" additive="sum" type="rotate"
        values="2 188 158; -1.8 188 158; 2.6 188 158; 2 188 158"
        dur="8.4s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" additive="sum" type="scale"
        values="1 1; 0.96 1.05; 1.03 0.97; 1 1"
        dur="6.3s" repeatCount="indefinite"/>

      <ellipse rx="34" ry="44" transform="translate(188 158)" fill="url(#petal2)">
        <animate attributeName="rx" values="34;35.5;33.4;34" dur="6.8s" repeatCount="indefinite"/>
        <animate attributeName="ry" values="44;42.2;45.5;44" dur="6.8s" repeatCount="indefinite"/>
      </ellipse>
      <ellipse rx="12" ry="9" transform="translate(176 140)" fill="url(#shine1)">
        <animate attributeName="rx" values="12;13;11.2;12" dur="5.6s" repeatCount="indefinite"/>
        <animate attributeName="ry" values="9;8.3;9.8;9" dur="5.6s" repeatCount="indefinite"/>
      </ellipse>
      <ellipse rx="4" ry="2" transform="translate(173 136)" fill="url(#hot1)">
        <animate attributeName="rx" values="4;4.6;3.7;4" dur="5.3s" repeatCount="indefinite"/>
      </ellipse>
    </g>
  </g>

  <!-- núcleo -->
  <circle r="62" transform="translate(140 140)" fill="url(#orbGrad)">
    <animate attributeName="r" values="62;63.2;62" dur="5.8s" repeatCount="indefinite"/>
  </circle>

  <g clip-path="url(#orbClip)">
    <ellipse rx="70" ry="50" transform="translate(140 200)" fill="url(#ambientGlow)">
      <animate attributeName="cy" values="200;196;200" dur="5.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.75;1;0.75" dur="5.6s" repeatCount="indefinite"/>
    </ellipse>

    <ellipse rx="40" ry="24" transform="matrix(0.866025 -0.5 0.5 0.866025 114 110)" fill="url(#specLarge)">
      <animateTransform attributeName="transform" additive="sum" type="translate"
        values="0 0; 2 -1.5; 0 0"
        dur="6.2s" repeatCount="indefinite"/>
    </ellipse>

    <ellipse rx="13" ry="6" transform="matrix(0.866025 -0.5 0.5 0.866025 112 106)" fill="url(#specSmall)">
      <animateTransform attributeName="transform" additive="sum" type="translate"
        values="0 0; 1 -0.8; 0 0"
        dur="5.4s" repeatCount="indefinite"/>
    </ellipse>

    <!-- único destello vertical, brillante y de altura completa -->
    <g>
      <!-- halo ancho -->
      <rect x="200" y="100" width="40" height="132" rx="20"
            fill="url(#sweepSoft)"
            opacity="0"
            filter="url(#sweepGlow)">
        <animate attributeName="x" values="0;210" dur="3.1s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0;1;1;0;0" dur="3.1s" repeatCount="indefinite"/>
      </rect>

      <!-- núcleo intenso -->
      <rect x="132" y="70" width="16" height="140" rx="8"
            fill="url(#sweepCore)"
            opacity="0"
            filter="url(#sweepCoreGlow)">
        <animate attributeName="x" values="1;270" dur="3.1s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0;0;1;0;0" dur="3.1s" repeatCount="indefinite"/>
      </rect>
    </g>
  </g>

  <circle r="62" transform="translate(140 140)" fill="url(#rimLight)">
    <animate attributeName="opacity" values="0.86;1;0.86" dur="5.2s" repeatCount="indefinite"/>
  </circle>

  <circle r="62" transform="translate(140 140)" opacity="0.45" fill="none" stroke="#0f8d9f" stroke-width="0.6"/>
  <circle r="62" transform="translate(140 140)" opacity="0.25" fill="none" stroke="#fff" stroke-width="0.4"/>

  <!-- texto -->
  <text x="140" y="129"
        text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="35"
        font-weight="600"
        letter-spacing="0.3"
        opacity="0.98"
        fill="#f4f5f7">eco</text>

  <text x="141.5" y="182.5"
        text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="66"
        font-weight="800"
        letter-spacing="-0.5"
        opacity="0.34"
        fill="#000000">IA</text>

  <text x="140" y="181"
        text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="66"
        font-weight="800"
        letter-spacing="-0.5"
        fill="url(#textGrad)">IA</text>
</svg>