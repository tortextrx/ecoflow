<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ecoFlow Chat — Bootstrap Friendly</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="./ecoflow-bootstrap.css">
</head>
<body class="efb-body">
  <div class="efb-shell card border-0 shadow-lg">
    <div class="card-header efb-header border-0">
      <div class="d-flex align-items-center gap-3 min-w-0">
        <div class="efb-avatar-wrap">
          <img src="./avatar.png" alt="ecoFlow" class="efb-avatar">
        </div>
        <div class="min-w-0">
          <div class="efb-brand">eco<span>Flow</span></div>
          <div class="efb-subtitle">Asistente ERP conversacional</div>
        </div>
      </div>
      <div class="efb-status badge text-bg-info-subtle border border-info-subtle rounded-pill px-3 py-2">
        <span class="efb-status-dot"></span>
        Conectado
      </div>
    </div>

    <div id="chatArea" class="card-body efb-chat">
      <div class="efb-row">
        <div class="efb-bubble efb-bubble-bot">
          Hola. Soy ecoFlow. Puedo ayudarte con clientes, servicios, contratos, artículos y facturación.
        </div>
      </div>
    </div>

    <div id="typingArea" class="efb-typing px-3 pb-2 d-none">
      <div class="efb-bubble efb-bubble-bot efb-typing-bubble">
        <span></span><span></span><span></span>
      </div>
      <small id="typingLabel" class="text-body-secondary">ecoFlow está pensando...</small>
    </div>

    <div class="card-footer efb-footer border-0">
      <div id="previewArea" class="alert alert-info d-none py-2 px-3 mb-2">
        <div class="d-flex align-items-center justify-content-between gap-3">
          <div class="text-truncate">Archivo adjunto: <strong id="previewName"></strong></div>
          <button id="clearFile" type="button" class="btn btn-sm btn-outline-secondary">Quitar</button>
        </div>
      </div>

      <div class="input-group align-items-end">
        <label class="btn btn-outline-secondary efb-attach-btn" for="fileInput" title="Adjuntar archivo">📎</label>
        <input id="fileInput" type="file" hidden accept="image/*,.pdf">
        <textarea id="msgInput" class="form-control efb-textarea" rows="1" placeholder="Escribe aquí…"></textarea>
        <button id="sendBtn" class="btn btn-info text-white efb-send-btn" type="button">Enviar</button>
      </div>
    </div>
  </div>

  <script src="./ecoflow-bootstrap.js"></script>
</body>
</html>
